[workspace]
name = "azo-plugin-event-architecture"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.11"

[feature.test.dependencies]
pexpect = ">=4.9"

[feature.test.pypi-dependencies]
pytest = ">=8"

[feature.test.tasks]
test = "PYTHONPATH=../agent-zoo:../agent-utils/src:src python -m pytest -q"

[environments]
test = ["test"]

[tool.agent-zoo.plugin]
name = "azo-plugin-event-architecture"
common = []
default = ["src/event_architecture.py"]
rlm = []

[tool.agent-zoo.plugin.config]
files = ["config/event_architecture.json"]
